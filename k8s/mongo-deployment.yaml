apiVersion: apps/v1
kind: Deployment
metadata:
  name: devproject-mongo
  namespace: devproject
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devproject-mongo
  template:
    metadata:
      labels:
        app: devproject-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: devproject-mongo-pvc
